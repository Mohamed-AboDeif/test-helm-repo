name: Release Helm Charts

on:
  push:
    branches:
      - main
    paths:
      - "charts/**"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Bootstrap gh-pages branch if missing
        run: |
          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "gh-pages branch not found — creating it..."
            CURRENT_BRANCH="${GITHUB_REF_NAME}"
            git checkout --orphan gh-pages
            git rm -rf . > /dev/null 2>&1 || true
            git commit --allow-empty -m "chore: bootstrap gh-pages branch for Helm repo"
            git push origin gh-pages
            git checkout "${CURRENT_BRANCH}"
            echo "gh-pages branch created and pushed."
          else
            echo "gh-pages branch already exists — skipping bootstrap."
          fi

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: charts
          config: .cr.yaml
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
